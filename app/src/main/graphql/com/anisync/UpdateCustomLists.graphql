mutation UpdateCustomLists($animeCustomLists: [String], $mangaCustomLists: [String]) {
  UpdateUser(
    animeListOptions: { customLists: $animeCustomLists }
    mangaListOptions: { customLists: $mangaCustomLists }
  ) {
    id
    mediaListOptions {
      animeList { customLists }
      mangaList { customLists }
    }
  }
}
