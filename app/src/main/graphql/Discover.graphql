query GetMediaBySort($sort: [MediaSort], $type: MediaType, $perPage: Int) {
  Page(perPage: $perPage) {
    media(sort: $sort, type: $type) {
      id
      title {
        userPreferred
        romaji
        english
        native
      }
      coverImage {
        medium
        large
        extraLarge
      }
      episodes
      chapters
      volumes
      type
      format
      averageScore
    }
  }
}

query GetUpcomingMedia($perPage: Int, $type: MediaType, $status: MediaStatus) {
  Page(perPage: $perPage) {
    media(status: $status, type: $type, sort: [POPULARITY_DESC]) {
      id
        title {
        userPreferred
        romaji
        english
        native
      }
      coverImage {
        medium
        large
        extraLarge
      }
      episodes
      chapters
      volumes
      type
      format
      averageScore
      season
    }
  }
}

query GetPaginatedMedia(
  $page: Int,
  $perPage: Int,
  $sort: [MediaSort],
  $type: MediaType,
  $status: MediaStatus,
  $format: MediaFormat
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      hasNextPage
      currentPage
      lastPage
      total
    }
    media(sort: $sort, type: $type, status: $status, format: $format) {
      id
      title {
        userPreferred
        romaji
        english
        native
      }
      coverImage {
        medium
        large
        extraLarge
      }
      episodes
      chapters
      volumes
      type
      format
      averageScore
      season
    }
  }
}
