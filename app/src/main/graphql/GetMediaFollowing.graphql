query GetMediaFollowing($mediaId: Int!, $page: Int!, $perPage: Int!) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      hasNextPage
      total
    }
    mediaList(
      mediaId: $mediaId,
      isFollowing: true,
      sort: [UPDATED_TIME_DESC]
    ) {
      id
      status
      score
      progress
      notes
      user {
        id
        name
        avatar {
          large
          medium
        }
        mediaListOptions {
          scoreFormat
        }
      }
    }
  }
}
