query GetMediaDetails($id: Int) {
    Media(id: $id) {
        id
        idMal
        title {
            romaji
            english
            native
            userPreferred
        }
        coverImage {
          medium
          large
          extraLarge
          color
        }
        bannerImage
        description(asHtml: true)
        synonyms
        hashtag
        rankings {
            id
            rank
            type
            year
            season
            allTime
            context
        }
        averageScore
        meanScore
        popularity
        favourites
        episodes
        duration
        nextAiringEpisode {
            episode
            airingAt
            timeUntilAiring
        }
        chapters
        volumes
        type
        status
        format
        source
        genres
        studios(sort: [FAVOURITES_DESC]) {
            edges {
                isMain
                node {
                    id
                    name
                }
            }
        }
        season
        startDate {
            year
            month
            day
        }
        endDate {
            year
            month
            day
        }
        trailer {
            id
            site
            thumbnail
        }
        tags {
            name
            category
            description
            isMediaSpoiler
            isGeneralSpoiler
            rank
        }
        mediaListEntry {
            id
            status
            progress
            score
            notes
            private
            hiddenFromStatusLists
        }
        characters(perPage: 25) {
            edges {
                role
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                }
            }
        }
        staff(sort: [RELEVANCE, ID], perPage: 25) {
            edges {
                role
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                    primaryOccupations
                }
            }
        }
        relations {
            edges {
                relationType
                node {
                    id
                    idMal
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    format
                    status
                    averageScore
                    startDate {
                        year
                        month
                        day
                    }
                    mediaListEntry {
                        status
                        progress
                    }
                    coverImage {
                      medium
                      large
                      extraLarge
                    }
                }
            }
        }
        externalLinks {
            id
            url
            site
            type
            color
            icon
            language
            notes
            isDisabled
        }
        recommendations(sort: [RATING_DESC], perPage: 25) {
            nodes {
                rating
                userRating
                mediaRecommendation {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                      medium
                      large
                      extraLarge
                    }
                    format
                    averageScore
                }
            }
        }
        reviews(sort: [RATING_DESC], perPage: 5) {
            nodes {
                id
                summary
                body(asHtml: true)
                score
                rating
                ratingAmount
                userRating
                user {
                    name
                    avatar {
                        medium
                    }
                }
                createdAt
            }
        }
        isFavourite
        isRecommendationBlocked
        isReviewBlocked
    }
}
