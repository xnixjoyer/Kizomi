query GetRecentReviews(
  $mediaType: MediaType,
  $mediaId: Int,
  $userId: Int,
  $sort: [ReviewSort] = [CREATED_AT_DESC],
  $page: Int = 1
) {
  Page(page: $page, perPage: 20) {
    pageInfo {
      hasNextPage
      total
    }
    reviews(mediaType: $mediaType, mediaId: $mediaId, userId: $userId, sort: $sort) {
      id
      summary
      body(asHtml: true)
      rating
      ratingAmount
      userRating
      score
      createdAt
      updatedAt
      media {
        id
        title {
          userPreferred
        }
        coverImage {
          medium
          large
          extraLarge
        }
        type
        bannerImage
      }
      user {
        id
        name
        avatar {
          large
        }
      }
    }
  }
}
