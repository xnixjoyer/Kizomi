query GetForumOverview($page: Int = 1, $perPage: Int = 15, $sort: [ThreadSort] = [IS_STICKY, REPLIED_AT_DESC], $subscribed: Boolean) {
  Page(page: $page, perPage: $perPage) {
    threads(sort: $sort, subscribed: $subscribed) {
      id
      title
      replyCount
      viewCount
      likeCount
      isLiked
      isSubscribed
      isLocked
      isSticky
      repliedAt
      replyCommentId
      createdAt
      user {
        id
        isBlocked
        name
        avatar {
          large
        }
      }
      replyUser {
        name
        avatar {
          large
        }
      }
      categories {
        id
        name
      }
      mediaCategories {
        title {
          romaji
        }
        coverImage {
          medium
          large
          extraLarge
        }
      }
    }
    pageInfo {
      hasNextPage
      currentPage
    }
  }
}
