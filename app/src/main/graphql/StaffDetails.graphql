query GetStaffDetails($id: Int!, $page: Int = 1, $staffMediaPage: Int = 1) {
    Staff(id: $id) {
        id
        name {
            full
            native
            userPreferred
            alternative
        }
        image {
            large
        }
        description(asHtml: true)
        gender
        age
        bloodType
        dateOfBirth {
            year
            month
            day
        }
        dateOfDeath {
            year
            month
            day
        }
        favourites
        isFavourite
        languageV2
        primaryOccupations
        yearsActive
        homeTown
        # The characters connection (NOT characterMedia): sortable by the characters' own
        # favourites, so "known for" surfaces the VA's most iconic roles. characterMedia can
        # only sort by media, which is why the AniList site grid orders feel irrelevant here.
        characters(page: $page, sort: [FAVOURITES_DESC], perPage: 25) {
            pageInfo {
                hasNextPage
            }
            edges {
                role
                node {
                    id
                    name {
                        full
                        native
                        userPreferred
                    }
                    image {
                        medium
                    }
                }
                media {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                        medium
                        large
                        extraLarge
                    }
                    startDate {
                        year
                    }
                    type
                    popularity
                    averageScore
                    favourites
                    mediaListEntry {
                        id
                    }
                }
            }
        }
        staffMedia(page: $staffMediaPage, sort: [START_DATE_DESC], perPage: 25) {
            pageInfo {
                hasNextPage
            }
            edges {
                staffRole
                node {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                        medium
                        large
                        extraLarge
                    }
                    startDate {
                        year
                    }
                    type
                    popularity
                    averageScore
                    favourites
                    mediaListEntry {
                        id
                    }
                }
            }
        }
    }
}