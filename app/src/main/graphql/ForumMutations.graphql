mutation CreateForumThread(
  $id: Int,
  $title: String!,
  $body: String!,
  $categories: [Int]!,
  $mediaCategories: [Int]
) {
  SaveThread(
    id: $id,
    title: $title,
    body: $body,
    categories: $categories,
    mediaCategories: $mediaCategories
  ) {
    id
    title
    body(asHtml: true)
    bodyRaw: body(asHtml: false)
    replyCount
    viewCount
    likeCount
    isLiked
    isLocked
    createdAt
    siteUrl
    user {
      id
      name
      avatar {
        large
      }
    }
    categories {
      id
      name
    }
  }
}

mutation CreateForumComment($id: Int, $threadId: Int!, $comment: String!) {
  SaveThreadComment(id: $id, threadId: $threadId, comment: $comment) {
    id
    comment(asHtml: true)
    commentRaw: comment(asHtml: false)
    likeCount
    isLiked
    createdAt
    siteUrl
    user {
      id
      name
      avatar {
        large
      }
    }
  }
}

mutation CreateForumCommentReply($id: Int, $threadId: Int!, $comment: String!, $parentCommentId: Int!) {
  SaveThreadComment(id: $id, threadId: $threadId, comment: $comment, parentCommentId: $parentCommentId) {
    id
    comment(asHtml: true)
    commentRaw: comment(asHtml: false)
    likeCount
    isLiked
    createdAt
    siteUrl
    user {
      id
      name
      avatar {
        large
      }
    }
  }
}

mutation DeleteForumThread($id: Int!) {
  DeleteThread(id: $id) {
    deleted
  }
}

mutation DeleteForumComment($id: Int!) {
  DeleteThreadComment(id: $id) {
    deleted
  }
}

mutation ToggleLikeThread($id: Int!) {
  ToggleLikeV2(id: $id, type: THREAD) {
    ... on Thread {
      id
      likeCount
      isLiked
    }
  }
}

mutation ToggleLikeThreadComment($id: Int!) {
  ToggleLikeV2(id: $id, type: THREAD_COMMENT) {
    ... on ThreadComment {
      id
      likeCount
      isLiked
    }
  }
}

mutation ToggleThreadSubscription($threadId: Int!, $subscribe: Boolean!) {
  ToggleThreadSubscription(threadId: $threadId, subscribe: $subscribe) {
    id
    isSubscribed
  }
}
