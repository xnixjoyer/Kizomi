query GetPlanningUpcomingEpisodes($mediaIds: [Int!], $airingBefore: Int!) {
  Page {
    airingSchedules(
      mediaId_in: $mediaIds
      episode: 1
      notYetAired: true
      airingAt_lesser: $airingBefore
      sort: [TIME]
    ) {
      id
      episode
      airingAt
      timeUntilAiring
      mediaId
      media {
        id
        title {
          userPreferred
          romaji
          english
          native
        }
        coverImage {
          medium
          large
          extraLarge
        }
        type
      }
    }
  }
}
