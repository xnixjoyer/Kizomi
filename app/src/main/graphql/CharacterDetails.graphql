query GetCharacterDetails($id: Int!, $page: Int = 1) {
    Character(id: $id) {
        id
        name {
            full
            native
            userPreferred
            alternative
        }
        image {
            large
        }
        description(asHtml: true)
        gender
        age
        dateOfBirth {
            year
            month
            day
        }
        bloodType
        favourites
        isFavourite
        media(page: $page, perPage: 25, sort: [POPULARITY_DESC]) {
            pageInfo {
                hasNextPage
            }
            edges {
                characterRole
                node {
                    id
                    title {
                        userPreferred
                        romaji
                        english
                        native
                    }
                    coverImage {
                      medium
                      large
                      extraLarge
                    }
                    bannerImage
                    type
                    startDate {
                        year
                    }
                    popularity
                    averageScore
                    favourites
                    mediaListEntry {
                        id
                    }
                }
                voiceActors(sort: [RELEVANCE, ID]) {
                    id
                    name {
                        full
                        native
                        userPreferred
                    }
                    image {
                        medium
                    }
                    languageV2
                }
            }
        }
    }
}