query GetViewer {
  Viewer {
    id
    name
    avatar {
      large
    }
    unreadNotificationCount
    options {
      titleLanguage
      displayAdultContent
      airingNotifications
      profileColor
      timezone
      activityMergeTime
      staffNameLanguage
      restrictMessagesToFollowing
      disabledListActivity {
        disabled
        type
      }
    }
    mediaListOptions {
      scoreFormat
      rowOrder
    }
  }
}
