query GetUserStatistics($userId: Int) {
  User(id: $userId) {
    id
    name
    mediaListOptions {
      scoreFormat
    }
    statistics {
      anime {
        count
        minutesWatched
        meanScore
        standardDeviation
        episodesWatched
        statuses {
          count
          status
        }
        genres(limit: 14, sort: [COUNT_DESC]) {
          genre
          count
          meanScore
          minutesWatched
        }
        tags(limit: 25, sort: [COUNT_DESC]) {
          tag {
            id
            name
          }
          count
          meanScore
          minutesWatched
        }
        scores(sort: [MEAN_SCORE_DESC]) {
          score
          count
          meanScore
          minutesWatched
        }
        formats(limit: 8, sort: [COUNT_DESC]) {
          format
          count
          meanScore
          minutesWatched
        }
        releaseYears(limit: 12, sort: [COUNT_DESC]) {
          releaseYear
          count
          meanScore
          minutesWatched
        }
        startYears(limit: 12, sort: [COUNT_DESC]) {
          startYear
          count
          meanScore
          minutesWatched
        }
        lengths(limit: 8, sort: [COUNT_DESC]) {
          length
          count
          meanScore
          minutesWatched
        }
        studios(limit: 12, sort: [COUNT_DESC]) {
          studio {
            id
            name
          }
          count
          meanScore
          minutesWatched
        }
        voiceActors(limit: 10, sort: [COUNT_DESC]) {
          voiceActor {
            id
            name {
              full
            }
            image {
              medium
            }
          }
          count
          meanScore
          minutesWatched
        }
        staff(limit: 10, sort: [COUNT_DESC]) {
          staff {
            id
            name {
              full
            }
            image {
              medium
            }
          }
          count
          meanScore
          minutesWatched
        }
        countries(limit: 6, sort: [COUNT_DESC]) {
          country
          count
          meanScore
          minutesWatched
        }
      }
      manga {
        count
        chaptersRead
        volumesRead
        meanScore
        standardDeviation
        statuses {
          count
          status
        }
        genres(limit: 14, sort: [COUNT_DESC]) {
          genre
          count
          meanScore
          chaptersRead
        }
        tags(limit: 25, sort: [COUNT_DESC]) {
          tag {
            id
            name
          }
          count
          meanScore
          chaptersRead
        }
        scores(sort: [MEAN_SCORE_DESC]) {
          score
          count
          meanScore
          chaptersRead
        }
        formats(limit: 8, sort: [COUNT_DESC]) {
          format
          count
          meanScore
          chaptersRead
        }
        releaseYears(limit: 12, sort: [COUNT_DESC]) {
          releaseYear
          count
          meanScore
          chaptersRead
        }
        startYears(limit: 12, sort: [COUNT_DESC]) {
          startYear
          count
          meanScore
          chaptersRead
        }
        lengths(limit: 8, sort: [COUNT_DESC]) {
          length
          count
          meanScore
          chaptersRead
        }
        staff(limit: 10, sort: [COUNT_DESC]) {
          staff {
            id
            name {
              full
            }
            image {
              medium
            }
          }
          count
          meanScore
          chaptersRead
        }
        countries(limit: 6, sort: [COUNT_DESC]) {
          country
          count
          meanScore
          chaptersRead
        }
      }
    }
    stats {
      activityHistory {
        date
        amount
        level
      }
    }
  }
}
