query GetActivity($id: Int!) {
  Activity(id: $id) {
    __typename
    ... on TextActivity {
      id
      userId
      text(asHtml: true)
      textRaw: text(asHtml: false)
      createdAt
      likeCount
      isLiked
      replyCount
      isSubscribed
      siteUrl
      user {
        id
        isBlocked
        name
        avatar {
          large
        }
      }
      replies {
        id
        userId
        activityId
        text(asHtml: true)
        textRaw: text(asHtml: false)
        likeCount
        isLiked
        createdAt
        user {
          id
          isBlocked
          name
          avatar {
            large
          }
        }
      }
    }
    ... on MessageActivity {
      id
      recipientId
      messengerId
      message(asHtml: true)
      createdAt
      likeCount
      isLiked
      replyCount
      isPrivate
      isSubscribed
      siteUrl
      messenger {
        id
        isBlocked
        name
        moderatorRoles
        avatar {
          large
        }
      }
      recipient {
        id
        isBlocked
        name
        avatar {
          large
        }
      }
      replies {
        id
        userId
        activityId
        text(asHtml: true)
        textRaw: text(asHtml: false)
        likeCount
        isLiked
        createdAt
        user {
          id
          isBlocked
          name
          avatar {
            large
          }
        }
      }
    }
    ... on ListActivity {
      id
      userId
      status
      progress
      createdAt
      likeCount
      isLiked
      replyCount
      isLocked
      isSubscribed
      siteUrl
      user {
        id
        isBlocked
        name
        avatar {
          large
        }
      }
      media {
        id
        type
        title {
          userPreferred
        }
        coverImage {
          medium
          large
          extraLarge
        }
        siteUrl
      }
      replies {
        id
        userId
        activityId
        text(asHtml: true)
        textRaw: text(asHtml: false)
        likeCount
        isLiked
        createdAt
        user {
          id
          isBlocked
          name
          avatar {
            large
          }
        }
      }
    }
  }
}

mutation SaveActivityReply($id: Int, $activityId: Int!, $text: String!) {
  SaveActivityReply(id: $id, activityId: $activityId, text: $text) {
    id
    activityId
    text(asHtml: true)
    createdAt
    likeCount
    isLiked
    user {
      id
      name
      avatar {
        large
      }
    }
  }
}

mutation ToggleActivityLike($id: Int!) {
  ToggleLikeV2(id: $id, type: ACTIVITY) {
    __typename
    ... on TextActivity {
      id
      likeCount
      isLiked
    }
    ... on MessageActivity {
      id
      likeCount
      isLiked
    }
    ... on ListActivity {
      id
      likeCount
      isLiked
    }
  }
}

mutation ToggleActivityReplyLike($id: Int!) {
  ToggleLikeV2(id: $id, type: ACTIVITY_REPLY) {
    __typename
    ... on ActivityReply {
      id
      likeCount
      isLiked
    }
  }
}

mutation DeleteActivity($id: Int!) {
  DeleteActivity(id: $id) {
    deleted
  }
}

mutation DeleteActivityReply($id: Int!) {
  DeleteActivityReply(id: $id) {
    deleted
  }
}

mutation SaveTextActivity($id: Int, $text: String!) {
  SaveTextActivity(id: $id, text: $text) {
    id
    text(asHtml: true)
    createdAt
    likeCount
    isLiked
    replyCount
    user {
      id
      name
      avatar {
        large
      }
    }
  }
}

mutation ToggleActivitySubscription($activityId: Int!, $subscribe: Boolean!) {
  ToggleActivitySubscription(activityId: $activityId, subscribe: $subscribe) {
    __typename
    ... on TextActivity {
      id
      isSubscribed
    }
    ... on MessageActivity {
      id
      isSubscribed
    }
    ... on ListActivity {
      id
      isSubscribed
    }
  }
}
