query GetPlanningFirstEpisodes($mediaIds: [Int!], $airingBefore: Int!, $airingAfter: Int!) {
  Page {
    airingSchedules(
      mediaId_in: $mediaIds
      episode: 1
      airingAt_lesser: $airingBefore
      airingAt_greater: $airingAfter
      sort: [TIME_DESC]
    ) {
      id
      episode
      airingAt
      mediaId
      media {
        id
        title {
          userPreferred
          romaji
          english
          native
        }
        coverImage {
          medium
          large
          extraLarge
        }
        type
      }
    }
  }
}
