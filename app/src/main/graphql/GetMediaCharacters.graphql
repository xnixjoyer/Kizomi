query GetMediaCharacters($id: Int, $page: Int, $perPage: Int, $sort: [CharacterSort]) {
    Media(id: $id) {
        characters(sort: $sort, page: $page, perPage: $perPage) {
            pageInfo {
                currentPage
                hasNextPage
            }
            edges {
                role
                voiceActors(sort: [RELEVANCE, ID]) {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                        medium
                    }
                    languageV2
                }
                node {
                    id
                    name {
                        userPreferred
                        full
                        native
                    }
                    image {
                        large
                    }
                }
            }
        }
    }
}
