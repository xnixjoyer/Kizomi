query GetNotifications(
  $page: Int = 1,
  $perPage: Int = 20,
  $typeIn: [NotificationType] = null,
  # Default false: resetting the unread count is a deliberate act of the inbox screen only.
  $resetCount: Boolean = false
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      hasNextPage
      currentPage
      total
    }
    notifications(type_in: $typeIn, resetNotificationCount: $resetCount) {
      ... on AiringNotification {
        id
        type
        episode
        contexts
        createdAt
        media {
          ...NotifMedia
        }
      }
      ... on FollowingNotification {
        id
        type
        context
        createdAt
        user {
          ...NotifUser
        }
      }
      ... on ActivityLikeNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          ...NotifUser
        }
        activity {
          ...NotifActivity
        }
      }
      ... on ActivityReplyNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          ...NotifUser
        }
        activity {
          ...NotifActivity
        }
      }
      ... on ActivityReplySubscribedNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          ...NotifUser
        }
        activity {
          ...NotifActivity
        }
      }
      ... on ActivityReplyLikeNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          ...NotifUser
        }
        activity {
          ...NotifActivity
        }
      }
      ... on ActivityMentionNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          ...NotifUser
        }
        activity {
          ...NotifActivity
        }
      }
      ... on ActivityMessageNotification {
        id
        type
        activityId
        context
        createdAt
        user {
          ...NotifUser
        }
        message {
          id
          message(asHtml: true)
        }
      }
      ... on ThreadCommentReplyNotification {
        id
        type
        context
        createdAt
        user {
          ...NotifUser
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on ThreadCommentSubscribedNotification {
        id
        type
        context
        createdAt
        user {
          ...NotifUser
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on ThreadCommentMentionNotification {
        id
        type
        context
        createdAt
        user {
          ...NotifUser
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on ThreadLikeNotification {
        id
        type
        context
        createdAt
        user {
          ...NotifUser
        }
        thread {
          id
          title
        }
      }
      ... on ThreadCommentLikeNotification {
        id
        type
        context
        createdAt
        user {
          ...NotifUser
        }
        thread {
          id
          title
        }
        comment {
          id
          comment(asHtml: true)
        }
      }
      ... on RelatedMediaAdditionNotification {
        id
        type
        mediaId
        context
        createdAt
        media {
          ...NotifMedia
        }
      }
      ... on MediaDataChangeNotification {
        id
        type
        mediaId
        context
        reason
        createdAt
        media {
          ...NotifMedia
        }
      }
      ... on MediaMergeNotification {
        id
        type
        mediaId
        deletedMediaTitles
        context
        reason
        createdAt
        media {
          ...NotifMedia
        }
      }
      ... on MediaDeletionNotification {
        id
        type
        deletedMediaTitle
        context
        reason
        createdAt
      }
    }
  }
}

fragment NotifUser on User {
  id
  isBlocked
  name
  avatar {
    large
  }
}

fragment NotifMedia on Media {
  id
  title {
    userPreferred
  }
  coverImage {
    medium
    large
    extraLarge
  }
  type
}

fragment NotifActivity on ActivityUnion {
  __typename
  ... on TextActivity {
    id
    text(asHtml: true)
  }
  ... on ListActivity {
    id
    type
    status
    progress
    media {
      ...NotifMedia
    }
  }
  ... on MessageActivity {
    id
    message(asHtml: true)
  }
}
