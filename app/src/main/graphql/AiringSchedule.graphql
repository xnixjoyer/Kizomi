query AiringSchedule($page: Int, $perPage: Int, $airingAtGreater: Int, $airingAtLesser: Int) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            hasNextPage
        }
        airingSchedules(airingAt_greater: $airingAtGreater, airingAt_lesser: $airingAtLesser, sort: TIME) {
            id
            episode
            airingAt
            timeUntilAiring

            media {
                id
                isAdult
                status
                format
                episodes
                season
                seasonYear
                startDate {
                    year
                    month
                    day
                }
                popularity
                averageScore
                synonyms
                externalLinks {
                    type
                    icon
                    site
                    url
                }

                title {
                    userPreferred
                    english
                    romaji
                    native
                }
                coverImage {
                  medium
                  large
                  extraLarge
                }
                genres
                mediaListEntry {
                    status
                }
            }
        }
    }
}
