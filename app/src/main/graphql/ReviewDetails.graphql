query ReviewDetails($id: Int) {
    Review(id: $id) {
        id
        summary
        body(asHtml: true)
        score
        rating
        ratingAmount
        userRating
        createdAt
        user {
            name
            avatar {
                medium
                large
            }
        }
        media {
            id
            title {
                userPreferred
            }
            coverImage {
              medium
              large
              extraLarge
            }
            bannerImage
        }
    }
}
