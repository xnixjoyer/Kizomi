query GetForumThread($id: Int!) {
    Thread(id: $id) {
        id
        title
        body(asHtml: true)
        bodyRaw: body(asHtml: false)
        replyCount
        viewCount
        likeCount
        isLiked
        isSubscribed
        isLocked
        isSticky
        repliedAt
        createdAt
        updatedAt
        siteUrl
        user {
            id
            isBlocked
            name
            avatar {
                large
            }
        }
        replyUser {
            name
            avatar {
                large
            }
        }
        categories {
            id
            name
        }
        mediaCategories {
            title {
                romaji
            }
            coverImage {
              medium
              large
              extraLarge
            }
        }
    }
}

query GetForumComments(
    $threadId: Int!,
    $page: Int = 1,
    $perPage: Int = 25
) {
    Page(page: $page, perPage: $perPage) {
        threadComments(threadId: $threadId, sort: [ID]) {
            id
            comment(asHtml: true)
            commentRaw: comment(asHtml: false)
            likeCount
            isLiked
            createdAt
            updatedAt
            siteUrl
            childComments
            user {
                id
                isBlocked
                name
                avatar {
                    large
                }
            }
        }
        pageInfo {
            total
            perPage
            currentPage
            lastPage
            hasNextPage
        }
    }
}
