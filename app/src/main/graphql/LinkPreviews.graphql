query GetLinkPreviews($mediaIds: [Int], $characterIds: [Int], $staffIds: [Int]) {
    mediaPage: Page(perPage: 25) {
        media(id_in: $mediaIds) {
            id
            title {
                userPreferred
            }
            coverImage {
              medium
              large
              extraLarge
              color
            }
            format
            seasonYear
            type
        }
    }
    characterPage: Page(perPage: 25) {
        characters(id_in: $characterIds) {
            id
            name {
                userPreferred
            }
            image {
                large
            }
        }
    }
    staffPage: Page(perPage: 25) {
        staff(id_in: $staffIds) {
            id
            name {
                userPreferred
            }
            image {
                large
            }
        }
    }
}

# Users can't be batched (Page.users has no id_in) and are addressed by username, so fetch
# each user link individually by name.
query GetUserPreview($name: String) {
    user: User(name: $name) {
        id
        name
        avatar {
            large
        }
    }
}
