name: Build manual APK

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Performance is the optimized everyday-test APK; diagnostic includes debug tooling and is not suitable for performance comparisons.'
        required: true
        default: performance
        type: choice
        options:
          - performance
          - diagnostic

concurrency:
  group: manual-build-${{ github.ref }}-${{ inputs.build_profile }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.build_profile }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Set up Gradle from wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing for performance build
        if: inputs.build_profile == 'performance'
        id: signing
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SECRET_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          keystore_file="$RUNNER_TEMP/performance.keystore"
          signing_mode="temporary"

          if [[ -n "${SIGNING_KEY:-}" && \
                -n "${SECRET_KEYSTORE_PASSWORD:-}" && \
                -n "${SECRET_KEY_ALIAS:-}" && \
                -n "${SECRET_KEY_PASSWORD:-}" ]]; then
            if printf '%s' "$SIGNING_KEY" | tr -d '[:space:]' | base64 --decode > "$keystore_file" 2>/dev/null && \
               keytool -list \
                 -keystore "$keystore_file" \
                 -storepass "$SECRET_KEYSTORE_PASSWORD" \
                 -alias "$SECRET_KEY_ALIAS" \
                 >/dev/null 2>&1; then
              signing_mode="persistent"
              keystore_password="$SECRET_KEYSTORE_PASSWORD"
              key_alias="$SECRET_KEY_ALIAS"
              key_password="$SECRET_KEY_PASSWORD"
              echo "Using the persistent repository signing key."
            else
              echo "::warning::The configured signing secrets are invalid. Falling back to a temporary CI key for this run."
              rm -f "$keystore_file"
            fi
          else
            echo "::warning::Persistent signing secrets are incomplete. Falling back to a temporary CI key for this run."
          fi

          if [[ "$signing_mode" == "temporary" ]]; then
            keystore_password="$(openssl rand -hex 24)"
            key_alias="anisyncplus-performance-ci"
            key_password="$keystore_password"

            keytool -genkeypair \
              -noprompt \
              -storetype PKCS12 \
              -keystore "$keystore_file" \
              -storepass "$keystore_password" \
              -keypass "$key_password" \
              -alias "$key_alias" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 3650 \
              -dname "CN=Kizomi Performance CI, OU=CI, O=Kizomi, L=Berlin, ST=Berlin, C=DE"

            echo "::warning::This optimized APK is installable, but a later run with a different temporary key cannot update it. Uninstall it before installing another temporary-signed performance APK."
          fi

          keytool -list -v \
            -keystore "$keystore_file" \
            -storepass "$keystore_password" \
            -alias "$key_alias" |
            sed -n '/SHA256:/p'

          echo "KEYSTORE_FILE=$keystore_file" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=$keystore_password" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$key_alias" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$key_password" >> "$GITHUB_ENV"
          echo "signing_mode=$signing_mode" >> "$GITHUB_OUTPUT"

      - name: Build requested profile
        id: build
        shell: bash
        env:
          BUILD_PROFILE: ${{ inputs.build_profile }}
          SIGNING_MODE: ${{ steps.signing.outputs.signing_mode }}
        run: |
          set -euo pipefail
          if [[ "$BUILD_PROFILE" == performance ]]; then
            echo "Building optimized, non-debuggable performance APK without LeakCanary."
            ./gradlew --build-cache --parallel assembleStableRelease
            echo "build_type=release" >> "$GITHUB_OUTPUT"

            if [[ "$SIGNING_MODE" == persistent ]]; then
              echo "channel=performance" >> "$GITHUB_OUTPUT"
            else
              echo "channel=performance-temporary-signing" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Building diagnostic debug APK with debug tooling. Do not use this artifact for performance comparisons."
            ./gradlew --build-cache --parallel assembleStableDebug
            echo "build_type=debug" >> "$GITHUB_OUTPUT"
            echo "channel=diagnostic" >> "$GITHUB_OUTPUT"
          fi

      - name: Select exact universal APK
        id: apk
        shell: bash
        env:
          BUILD_TYPE: ${{ steps.build.outputs.build_type }}
          CHANNEL: ${{ steps.build.outputs.channel }}
        run: |
          set -euo pipefail
          mapfile -t apks < <(find "app/build/outputs/apk/stable/$BUILD_TYPE" \
            -maxdepth 1 \
            -type f \
            -name "Kizomi-*-universal-$BUILD_TYPE.apk" \
            -print)

          [[ ${#apks[@]} -eq 1 ]] || {
            printf 'Expected one universal %s APK, found %s\n' "$BUILD_TYPE" "${#apks[@]}"
            printf 'Candidates:\n'
            printf ' - %s\n' "${apks[@]:-none}"
            exit 1
          }

          short_sha="${GITHUB_SHA::8}"
          target="$RUNNER_TEMP/Kizomi-${short_sha}-run${GITHUB_RUN_NUMBER}-${CHANNEL}.apk"
          cp "${apks[0]}" "$target"
          echo "path=$target" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: Kizomi-${{ steps.build.outputs.channel }}-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
