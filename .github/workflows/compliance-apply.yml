name: Apply verified compliance unit

on:
  push:
    branches:
      - compliance/mal-api-agreement-readiness
    paths:
      - '.github/workflows/compliance-apply.yml'

permissions:
  contents: write

concurrency:
  group: compliance-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact staging head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Apply verified local worktree payload
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test -f .compliance-upload/part-00
          test -f .compliance-upload/part-11
          payload_dir="$RUNNER_TEMP/kizomi-compliance-payload"
          mkdir -p "$payload_dir"
          cat .compliance-upload/part-* | base64 --decode > "$RUNNER_TEMP/payload.tar.xz"
          tar -xJf "$RUNNER_TEMP/payload.tar.xz" -C "$payload_dir"
          cp -a "$payload_dir/tree/." .
          while IFS= read -r path; do
            [[ -z "$path" ]] || rm -rf -- "$path"
          done < "$payload_dir/meta/deletions.txt"
          rm -rf .compliance-upload
          rm -f .github/workflows/compliance-apply.yml
          rm -f .github/workflows/compliance-workspace-export.yml
          git add -A
          if git diff --cached --quiet; then
            echo '::error::Payload produced no changes'
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(compliance): complete MAL application readiness hardening'
          git push origin HEAD:compliance/mal-api-agreement-readiness
