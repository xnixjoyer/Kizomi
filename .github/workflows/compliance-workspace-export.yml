name: Compliance workspace export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'compliance/mal-api-agreement-readiness'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create authenticated short-lived workspace archive
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          evidence="$RUNNER_TEMP/compliance-workspace"
          mkdir -p "$evidence"
          git archive --format=zip --output="$evidence/kizomi-compliance-workspace.zip" HEAD
          git rev-parse HEAD > "$evidence/head-sha.txt"
          git rev-parse 'HEAD^{tree}' > "$evidence/tree-sha.txt"

      - name: Upload short-lived workspace archive
        uses: actions/upload-artifact@v4
        with:
          name: compliance-workspace-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/compliance-workspace
          if-no-files-found: error
          retention-days: 1
