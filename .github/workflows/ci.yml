name: Apply final readiness payload

on:
  pull_request:
  push:
    branches:
      - compliance/mal-api-agreement-readiness
    paths:
      - '.github/workflows/ci.yml'

permissions:
  contents: write

concurrency:
  group: final-readiness-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXACT_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_SHA }}
          fetch-depth: 0

      - name: Decode, verify, and publish final tree
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXACT_SHA"
          mapfile -t parts < <(find .compliance-final -maxdepth 1 -type f -name 'part-*' | sort)
          [[ ${#parts[@]} -eq 6 ]] || { echo "Expected six payload parts, found ${#parts[@]}"; exit 1; }
          cat "${parts[@]}" > "$RUNNER_TEMP/final-payload.b64"
          base64 --decode "$RUNNER_TEMP/final-payload.b64" > "$RUNNER_TEMP/final-payload.tar.xz"
          tar -xJf "$RUNNER_TEMP/final-payload.tar.xz" -C .
          rm -rf .compliance-final
          rm -f .github/workflows/compliance-final-apply.yml
          python3 tools/verification/verify-exclusive-provider-boundary.py
          python3 tools/verification/verify-provider-native-boundary.py
          python3 tools/verification/verify-tracking-write-boundary.py
          python3 tools/verification/verify-room-migration-contract.py
          python3 tools/verification/verify-repository-secrets.py
          python3 tools/verification/verify-redaction-and-backup.py
          python3 tools/verification/verify-product-readiness-contract.py
          python3 tools/verification/verify-mal-application-readiness.py
          bash tools/verification/verify-signing-workflows.sh
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(compliance): complete MAL application readiness'
          git push origin HEAD:compliance/mal-api-agreement-readiness
