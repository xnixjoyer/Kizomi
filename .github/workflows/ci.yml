name: Pull request and push CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'tools/verification/**'
      - '.github/workflows/verify-phase1-completion.yml'
      - '.github/workflows/export-phase1-workspace.yml'
  push:
    branches:
      - main
      - dev
      - 'codex/**'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle from wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Commit metadata
        run: |
          git rev-parse HEAD
          git log -1 --format='%h %cI %s'

      - name: Verify public provider boundary
        if: github.repository == 'xnixjoyer/Kizomi'
        run: bash tools/verification/verify-public-source-boundary.sh

      - name: Verify signing workflow contracts
        run: bash tools/verification/verify-signing-workflows.sh

      - name: Test, lint, and build Stable Debug
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --build-cache --parallel --continue \
            testStableDebugUnitTest \
            lintStableDebug \
            assembleStableDebug \
            assembleStableDebugAndroidTest

      - name: Verify exported Room schema is committed
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain -- app/schemas)" ]]; then
            echo '::error::Room generated an uncommitted schema. Commit the exact generated JSON.'
            git status --short -- app/schemas
            git diff -- app/schemas
            while IFS= read -r schema; do
              git diff --no-index /dev/null "$schema" || true
            done < <(git ls-files --others --exclude-standard -- app/schemas)
            exit 1
          fi

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Kizomi-${{ github.sha }}-run${{ github.run_number }}-failure-reports
          path: |
            app/build/test-results/testStableDebugUnitTest/**
            app/build/reports/tests/testStableDebugUnitTest/**
            app/build/reports/lint-results-stableDebug.*
            app/build/intermediates/lint_intermediate_text_report/stableDebug/**
          if-no-files-found: warn
          retention-days: 7

      - name: Select exact universal APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk/stable/debug -maxdepth 1 -type f -name 'Kizomi-*-universal-debug.apk' -print)
          [[ ${#apks[@]} -eq 1 ]] || { printf 'Expected one universal APK, found %s\n' "${#apks[@]}"; exit 1; }
          short_sha="${GITHUB_SHA::8}"
          target="$RUNNER_TEMP/Kizomi-${short_sha}-run${GITHUB_RUN_NUMBER}-diagnostic.apk"
          cp "${apks[0]}" "$target"
          echo "path=$target" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostic APK
        uses: actions/upload-artifact@v4
        with:
          name: Kizomi-${{ github.sha }}-run${{ github.run_number }}-diagnostic-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14
