name: Finalize Room schema and remove temporary compliance transport

on:
  push:
    branches:
      - compliance/mal-api-agreement-readiness
    paths:
      - '.github/workflows/compliance-room-schema-finalize.yml'

permissions:
  contents: write

concurrency:
  group: compliance-room-schema-finalize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact triggering head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle from wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Generate exact Room schema and clean temporary transport
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          ./gradlew --build-cache :app:kspStableDebugKotlin
          if [[ -z "$(git status --porcelain -- app/schemas)" ]]; then
            echo '::error::Room did not produce the expected schema update.'
            exit 1
          fi
          git status --short -- app/schemas
          rm -rf .compliance-upload
          rm -f .github/workflows/compliance-apply.yml
          rm -f .github/workflows/compliance-fix-run117.yml
          rm -f .github/workflows/compliance-workspace-export.yml
          rm -f .github/workflows/compliance-room-schema-finalize.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(room): commit generated schema and remove temporary workflows'
          git push origin HEAD:compliance/mal-api-agreement-readiness
