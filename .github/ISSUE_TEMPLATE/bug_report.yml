name: Bug Report
description: Report something in AniSync that is broken, crashing, or behaving incorrectly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Filling this out fully makes the issue much faster to triage.

        - Search [existing issues](https://github.com/Marco-9456/AniSync/issues?q=is%3Aissue) first; duplicates will be closed.
        - Make sure you are on the [latest release](https://github.com/Marco-9456/AniSync/releases/latest) before filing.
        - For questions or general discussion, use [Discussions](https://github.com/Marco-9456/AniSync/discussions) instead.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Pre-flight checks
      description: Confirm before submitting.
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am on the latest release of AniSync.
          required: true
        - label: I have read the relevant docs (README, CHANGELOG) when applicable.
          required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what is wrong.
      placeholder: e.g. App crashes when opening a manga's details page from the search screen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact, numbered steps from a clean app state. Include the specific anime/manga title or AniList ID if relevant.
      placeholder: |
        1. Log in with AniList account.
        2. Open Search tab and query "Frieren".
        3. Tap the first result.
        4. App closes immediately.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Media details screen opens and shows the entry.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: App crashes / blank screen / wrong data shown.
    validations:
      required: true

  - type: textarea
    id: app-info
    attributes:
      label: App info
      description: |
        In AniSync, go to **Settings → About** and tap **Copy app info**, then paste the result here. It produces output like:
        ```
        App version: 1.6.0
        Device information: Android 12 (API 31)
        Supported ABIs: (arm64-v8a, armeabi-v7a, armeabi)
        ```
      render: text
    validations:
      required: true

  - type: dropdown
    id: build-source
    attributes:
      label: Where did you install AniSync from?
      options:
        - GitHub Release (stable)
        - GitHub Release (preview)
        - F-Droid
        - Self-built from source
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      description: Manufacturer and model. Include OS skin if not stock (e.g. One UI 7, MIUI 14, ColorOS 15).
      placeholder: Pixel 8 Pro / Samsung Galaxy S23 (One UI 6.1)
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Reproducibility
      options:
        - Always (100%)
        - Often (more than half the time)
        - Sometimes
        - Once
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: |
        If the app crashed, attach the logcat output or stack trace. From a connected device:
        `adb logcat -d *:E | grep -i anisync`
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images/video here. Helpful for UI glitches.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else — network conditions, custom themes, accessibility settings, work profile, etc.
